# ── Startup ──────────────────────────────────────────────────────────────────
startup_session                ~/.config/kitty/session.conf
# Enable remote control so --single-instance works (see alias note below)
allow_remote_control           socket-only
listen_on                      unix:/tmp/kitty.sock

# ── Cursor ───────────────────────────────────────────────────────────────────
cursor_shape                   beam
cursor_color                   #c0392b
cursor_stop_blinking_after     0
cursor_trail                   3
cursor_trail_decay             0.1 0.4
cursor_trail_start_threshold   2

# ── Font ─────────────────────────────────────────────────────────────────────
font_size                      15
font_features JetBrainsMonoNerdFont-Regular    calt liga
font_features JetBrainsMonoNerdFont-Bold       calt liga
font_features JetBrainsMonoNerdFont-Italic     calt liga
font_features JetBrainsMonoNerdFont-BoldItalic calt liga

# ── Background image (5% image, 95% black) ───────────────────────────────────
background                     #000000
background_opacity             1.0
dynamic_background_opacity     no
background_image               ~/.config/wallpapers/Serene Japanese Landscape with Red Sun.jpg
background_image_layout        cscaled
background_image_linear        yes
background_tint                0.95

# ── Window ───────────────────────────────────────────────────────────────────
window_padding_width           8 12
hide_window_decorations        yes
active_border_color            #c0392b
inactive_border_color          #2a2a2a
draw_minimal_borders           yes

# ── URLs ─────────────────────────────────────────────────────────────────────
url_color                      #5598e0
url_style                      curly

# ── Misc ─────────────────────────────────────────────────────────────────────
scrollback_lines               10000
copy_on_select                 yes
mouse_hide_wait                -1
focus_follows_mouse            yes
strip_trailing_spaces          smart
select_by_word_characters      @-./_~?&=%+#

# ── Shell integration (gives kitty live cwd for tab titles) ──────────────────
shell_integration              enabled

# ── Tab bar ──────────────────────────────────────────────────────────────────
tab_bar_edge                   top
tab_bar_style                  powerline
tab_powerline_style            round
tab_bar_align                  left
tab_bar_min_tabs               2
tab_bar_margin_height          2.0 0.0

# Always shows current directory basename via syscall (no shell title tricks)
# Bell/activity indicators appear when something needs attention
tab_title_template             " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index} 󰉋 {tab.active_wd.split('/')[-1] or '/'} "

tab_bar_background             #080808
active_tab_foreground          #ffffff
active_tab_background          #c0392b
active_tab_font_style          bold
inactive_tab_foreground        #666666
inactive_tab_background        #161616
inactive_tab_font_style        normal
tab_bar_margin_color           #080808

# ── Keybindings ──────────────────────────────────────────────────────────────

# Tabs
map ctrl+t              new_tab
map ctrl+w              close_tab
map ctrl+tab            next_tab
map ctrl+shift+tab      previous_tab
map ctrl+shift+t        set_tab_title
map ctrl+shift+n        launch --cwd=current --type=tab

# Word movement
map ctrl+left           send_text all \x1b[1;5D
map ctrl+right          send_text all \x1b[1;5C

# Character selection: shift+arrow
map shift+left          send_text all \x1b[1;2D
map shift+right         send_text all \x1b[1;2C

# Word selection: ctrl+shift+arrow
map ctrl+shift+left     send_text all \x1b[1;6D
map ctrl+shift+right    send_text all \x1b[1;6C

# Delete word backward
map ctrl+backspace      send_text all \x17

# Copy / paste
map ctrl+shift+a        launch --stdin-source=@screen_scrollback --type=background wl-copy
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Font size (like browser — ctrl+= bigger, ctrl+- smaller, ctrl+0 reset)
map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+0              change_font_size all 0

# Clear screen AND scrollback completely
map ctrl+shift+l        combine : clear_terminal scrollback active : send_text normal \x0c

# Splits (kitty windows within a tab)
map ctrl+shift+d        launch --location=vsplit --cwd=current
map ctrl+shift+minus    launch --location=hsplit --cwd=current
map ctrl+shift+z        toggle_layout stack
map ctrl+alt+left       neighboring_window left
map ctrl+alt+right      neighboring_window right
map ctrl+alt+up         neighboring_window up
map ctrl+alt+down       neighboring_window down

# Hints: keyboard-driven picker for URLs / paths / words on screen
map ctrl+shift+e        open_url_with_hints
map ctrl+shift+u        kitten hints --type path --program -

# Scrollback & command output (shell integration required — already enabled)
map ctrl+shift+h        show_scrollback
map ctrl+shift+g        show_last_command_output
